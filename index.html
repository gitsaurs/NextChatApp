<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
  <title>NexChat — Sign in</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>"/>
</head>
<body style="overflow-y:auto;height:auto;">

<!-- Animated background -->
<div class="bg-mesh"></div>

<div class="auth-page">
  <div class="auth-card glass">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div>
        <div class="auth-logo-name grad-text">NexChat</div>
        <div class="auth-logo-tag">ENCRYPTED · REAL-TIME</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div id="loginError" class="auth-error hidden"></div>

      <div class="input-group">
        <label class="input-label">Email address</label>
        <input class="input-field" type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email"/>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input class="input-field" type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password"/>
        <div style="text-align:right;margin-top:4px;">
          <a href="#" onclick="handleForgotPassword(event)" style="font-size:12px;color:var(--c-accent);">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:4px;">
        Sign In
      </button>

      <div class="divider">or continue with</div>

      <button type="button" class="google-btn" onclick="handleGoogle()">
        <!-- Google logo SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <!-- ── SIGNUP FORM ── -->
    <form class="auth-form hidden" id="signupForm" onsubmit="handleSignup(event)">
      <div id="signupError" class="auth-error hidden"></div>

      <div class="input-group">
        <label class="input-label">Display name</label>
        <input class="input-field" type="text" id="signupName" placeholder="Your full name" required minlength="2" autocomplete="name"/>
      </div>

      <div class="input-group">
        <label class="input-label">Email address</label>
        <input class="input-field" type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email"/>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input class="input-field" type="password" id="signupPassword" placeholder="Min. 8 characters"
               required minlength="8" autocomplete="new-password" oninput="checkPasswordStrength(this.value)"/>
        <div class="pw-strength">
          <div class="pw-bar" id="pwBar1"></div>
          <div class="pw-bar" id="pwBar2"></div>
          <div class="pw-bar" id="pwBar3"></div>
          <div class="pw-bar" id="pwBar4"></div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Confirm password</label>
        <input class="input-field" type="password" id="signupConfirm" placeholder="Repeat password" required autocomplete="new-password"/>
      </div>

      <div style="font-size:12px;color:var(--c-text-3);line-height:1.5;display:flex;gap:6px;align-items:flex-start;">
        <input type="checkbox" id="agreeTerms" required style="margin-top:2px;accent-color:var(--c-accent);"/>
        <label for="agreeTerms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn btn-primary" id="signupBtn" style="width:100%;margin-top:4px;">
        Create Account
      </button>

      <div class="divider">or continue with</div>

      <button type="button" class="google-btn" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>

  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<script type="module" src="auth.js"></script>
</body>
</html>
